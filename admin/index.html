<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herbolaria - Admin</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f7f6;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .admin-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #1b3b2f;
      margin-bottom: 10px;
    }
    p {
      color: #4a5f55;
      margin-bottom: 30px;
    }
    .btn {
      background: #2a5a45;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin: 10px 0;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #1b3b2f;
      transform: translateY(-2px);
    }
    .btn-outline {
      background: white;
      color: #2a5a45;
      border: 1px solid #2a5a45;
    }
    .info {
      background: #eaf3ef;
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="admin-card">
    <h1>🌿 Herbolaria</h1>
    <p>Panel d'administration</p>
    
    <div class="info">
      <strong>🔐 Connexion Netlify Identity</strong>
      <p style="margin-top: 10px; font-size: 14px;">
        Pour accéder à l'admin, vous devez :<br>
        1. Activer Netlify Identity<br>
        2. Inviter des utilisateurs<br>
        3. Vous connecter ci-dessous
      </p>
    </div>

    <a href="/admin/" class="btn">
      <span>🔑 Se connecter</span>
    </a>
    
    <a href="/" class="btn btn-outline" style="margin-left: 10px;">
      ← Retour au site
    </a>
  </div>

  <!-- Script Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</body>
</html>
